[mcp.servers.gbrain.env]
# -----------------------------------------------------------------------------
# 启动严格校验
# -----------------------------------------------------------------------------
# gbrain 启动时会校验本栏目里的配置。必选项缺失、空值、枚举非法、布尔/数字格式非法都会直接报错并终止启动。
# 外部模型服务不再使用共享 API 密钥、共享基础 URL 或旧兼容别名；每个用途必须配置自己的 key/base URL/model。
# embedding 已改用 GBRAIN_EMBEDDING_* 命名，不再使用 GBRAIN_OPENAI_*。

# -----------------------------------------------------------------------------
# 数据路径
# -----------------------------------------------------------------------------
# gbrain 数据根目录，必填。数据库、日志、制品、缓存等运行数据都会放在该目录或其子目录。
# 建议使用绝对路径，避免 MCP/服务进程工作目录变化导致数据写到错误位置。
GBRAIN_DIR = "<请填写 gbrain 数据根目录>"

# SQLite 数据库文件路径，必填。启动时不会回退到 GBRAIN_DIR/brain.db。
GBRAIN_DB_PATH = "<请填写 SQLite 数据库文件路径>"

# -----------------------------------------------------------------------------
# Embedding 向量化配置
# -----------------------------------------------------------------------------
# embedding API 密钥，必填。只用于嵌入向量请求，不再作为其它 LLM 功能的共享密钥。
GBRAIN_EMBEDDING_API_KEY = "<请填写 embedding API 密钥>"

# embedding API 基础 URL，必填。实际请求路径为：GBRAIN_EMBEDDING_BASE_URL + /embeddings。
# 必须是 http/https URL；不会回退到 OpenAI 默认地址。
GBRAIN_EMBEDDING_BASE_URL = "https://open.bigmodel.cn/api/paas/v4"

# embedding 模型名称，必填。用于文档向量化、查询向量、语义搜索。
GBRAIN_EMBEDDING_MODEL = "embedding-3"

# embedding 向量维度，必填正整数。服务端返回维度不一致时，该批向量会被拒绝。
GBRAIN_EMBEDDING_DIMENSIONS = "1536"

# embedding 请求并发批次数，可选但这里显式配置。
# 可选值：1..8 的整数。1 最稳；2..8 导入更快但更容易触发限流。
GBRAIN_EMBEDDING_CONCURRENCY = "1"

# -----------------------------------------------------------------------------
# 查询扩展、查询改写、重排、增强 LLM 配置
# -----------------------------------------------------------------------------
# 查询扩展、查询改写、搜索重排、分块增强等聊天任务的 API 密钥，必填。
# 不会回退到 embedding API 密钥。
GBRAIN_EXPANSION_API_KEY = "<请填写查询扩展 API 密钥>"

# 查询扩展相关聊天补全基础 URL，必填。实际请求路径通常为：GBRAIN_EXPANSION_BASE_URL + /chat/completions。
GBRAIN_EXPANSION_BASE_URL = "https://open.bigmodel.cn/api/coding/paas/v4"

# 查询扩展相关聊天模型，必填。glm 开头模型会在源码中自动关闭 thinking，便于稳定输出结构化 JSON。
GBRAIN_EXPANSION_MODEL = "glm-5.2"

# -----------------------------------------------------------------------------
# LLM 引导分块配置
# -----------------------------------------------------------------------------
# LLM 分块器 API 密钥，必填。用于让模型识别普通脑页的自然章节边界。
# 不会作为 RAPTOR 的回退密钥；RAPTOR 必须配置自己的密钥。
GBRAIN_CHUNKER_API_KEY = "<请填写 LLM 分块器 API 密钥>"

# LLM 分块器聊天补全基础 URL，必填。实际请求路径通常为：GBRAIN_CHUNKER_BASE_URL + /chat/completions。
GBRAIN_CHUNKER_BASE_URL = "https://open.bigmodel.cn/api/coding/paas/v4"

# LLM 分块器模型，必填。输出期望是 JSON 数组；glm 开头模型会自动关闭 thinking。
GBRAIN_CHUNKER_MODEL = "glm-5.2"

# 普通脑页分块模式，未配置时默认 auto。
# 可选值：
# - auto：默认。非代码脑页优先尝试 LLM 引导分块；模型不可用、输出不适合或内容超限时回退递归分块。
# - recursive：始终使用本地递归分块，不调用 LLM 分块器。
# - llm：强制优先调用 LLM 分块器；失败时仍回退递归分块，避免页面没有 chunks。
# 说明：该配置只影响 pages/chunks 的普通脑页分块；KB 文档仍使用 src/kb/splitter 自适应分块。
GBRAIN_PAGE_CHUNKER_MODE = "auto"

# -----------------------------------------------------------------------------
# KB RAPTOR 摘要配置
# -----------------------------------------------------------------------------
# RAPTOR 递归摘要树 API 密钥，必填。
# 不会从库级配置、EXPANSION、CHUNKER 或 EMBEDDING 配置回退。
GBRAIN_KB_RAPTOR_API_KEY = "<请填写 RAPTOR API 密钥>"

# RAPTOR 摘要聊天补全基础 URL，必填。实际请求路径通常为：GBRAIN_KB_RAPTOR_BASE_URL + /chat/completions。
GBRAIN_KB_RAPTOR_BASE_URL = "https://open.bigmodel.cn/api/coding/paas/v4"

# RAPTOR 摘要模型，必填。不会回退到 GBRAIN_EXPANSION_MODEL、GBRAIN_CHUNKER_MODEL 或默认模型。
GBRAIN_KB_RAPTOR_MODEL = "glm-5.2"

# -----------------------------------------------------------------------------
# 音频转录配置
# -----------------------------------------------------------------------------
# 音频转录提供方，必填。
# 可选值：openai / groq。启动时会校验所选提供方对应的 key 和 base URL。
GBRAIN_TRANSCRIPTION_PROVIDER = "openai"

# Groq 提供方 API 密钥。GBRAIN_TRANSCRIPTION_PROVIDER="groq" 时必填；其它提供方时保留为显式备用配置。
GBRAIN_TRANSCRIPTION_GROQ_API_KEY = "<请填写 Groq 转录 API 密钥>"

# Groq 提供方基础 URL。实际请求会追加 /audio/transcriptions。必须是 http/https URL。
GBRAIN_TRANSCRIPTION_GROQ_BASE_URL = "https://open.bigmodel.cn/api/paas/v4"

# OpenAI 兼容转录 API 密钥。GBRAIN_TRANSCRIPTION_PROVIDER="openai" 时必填。
# 不会回退到 embedding API 密钥。
GBRAIN_TRANSCRIPTION_OPENAI_API_KEY = "<请填写 OpenAI 兼容转录 API 密钥>"

# OpenAI 兼容转录基础 URL。实际请求会追加 /audio/transcriptions。不会回退到 embedding 基础 URL。
GBRAIN_TRANSCRIPTION_OPENAI_BASE_URL = "https://open.bigmodel.cn/api/paas/v4"

# -----------------------------------------------------------------------------
# 日志配置
# -----------------------------------------------------------------------------
# 是否写入日志文件，必填布尔值。可选值：true / false。
GBRAIN_LOG_TO_FILE = "true"

# 是否把日志输出到标准错误，必填布尔值。MCP stdio 服务建议 false，避免干扰 JSON-RPC 标准输出。
GBRAIN_LOG_TO_CONSOLE = "false"

# gbrain 默认日志级别，必填。可选值：trace / debug / info / warn / error。
# trace 最详细；debug 适合调试；info 为常规运行；warn/error 更安静。
GBRAIN_LOG_LEVEL = "trace"

# 日志文件路径。GBRAIN_LOG_TO_FILE=true 时必填；实际文件名可能带日期后缀。
GBRAIN_LOG_FILE_PATH = "<请填写日志文件路径>"

# gbrain 专用 tracing 日志过滤规则，可选但这里显式配置。优先级高于 GBRAIN_LOG_LEVEL。
# 非法规则会导致启动失败；为空也会被视为配置错误。
#
# 基本语法：
#   1. 写单个级别，作为全局默认过滤级别：
#      GBRAIN_RUST_LOG = "info"
#   2. 写一组英文逗号分隔的规则：
#      GBRAIN_RUST_LOG = "warn,gbrain_core::kb::pipeline=debug,gbrain_core::kb::ocr_glm=trace"
#   3. 每条模块规则格式为：
#      <tracing target>=<level>
#
# 可用 level：
#   trace  最详细，包含大量内部细节
#   debug  调试信息
#   info   常规运行信息
#   warn   只看警告及错误
#   error  只看错误
#
# tracing target 通常等于 Rust 模块路径；gbrain 主库 crate 是 gbrain_core，CLI 二进制是 gbrain。
# 父模块规则通常会覆盖其子模块，例如 gbrain_core::kb=debug 会影响 gbrain_core::kb::pipeline。
#
# 常用 gbrain 模块过滤 target：
#   gbrain_core                         整个 gbrain 核心库
#   gbrain                              CLI 入口
#   gbrain_core::config                 配置加载与运行时校验
#   gbrain_core::mcp                    MCP stdio 服务层
#   gbrain_core::operations             CLI/MCP 操作编排层
#   gbrain_core::sqlite_engine          SQLite / FTS / sqlite-vec 存储层
#   gbrain_core::artifact               artifact 写入、上传、查询、投影、promotion
#   gbrain_core::artifact::promotion    promotion / auto-apply / rollback
#   gbrain_core::artifact::upload       文件上传与 artifact 路由
#   gbrain_core::kb                     KB 子系统整体
#   gbrain_core::kb::pipeline           文档导入、解析、切分、索引 pipeline
#   gbrain_core::kb::worker             后台 job worker
#   gbrain_core::kb::search             KB 检索、召回、融合
#   gbrain_core::kb::rerank             rerank 逻辑
#   gbrain_core::kb::ocr_glm            GLM OCR 请求、响应、错误处理
#   gbrain_core::kb::ocr_detector       PDF/图片 OCR 触发判断
#   gbrain_core::chunker                页面/代码/LLM chunker
#   gbrain_core::search                 搜索扩展、关键词、混合检索
#   gbrain_core::embedding              embedding 请求与向量处理
#   gbrain_core::enrichment             页面增强、实体提取、分层
#   gbrain_core::sync                   同步与导入
#
# 常用组合示例：
#   仅看常规信息：
#     GBRAIN_RUST_LOG = "info"
#   全局保持安静，只打开 KB pipeline 调试：
#     GBRAIN_RUST_LOG = "warn,gbrain_core::kb::pipeline=debug"
#   排查 OCR：
#     GBRAIN_RUST_LOG = "info,gbrain_core::kb::ocr_detector=debug,gbrain_core::kb::ocr_glm=trace"
#   排查检索：
#     GBRAIN_RUST_LOG = "info,gbrain_core::kb::search=debug,gbrain_core::search=debug,gbrain_core::kb::rerank=debug"
#   排查 artifact promotion：
#     GBRAIN_RUST_LOG = "info,gbrain_core::artifact::promotion=debug,gbrain_core::artifact::projection=debug"
#   降低第三方库噪音，同时打开 gbrain 调试：
#     GBRAIN_RUST_LOG = "gbrain_core=debug,gbrain=info,reqwest=warn,hyper=warn"
#
# 当前示例打开全量 trace；生产环境通常建议使用 info 或 warn，再单独放大目标模块。
GBRAIN_RUST_LOG = "trace"

# -----------------------------------------------------------------------------
# 页面写入后的后处理配置
# -----------------------------------------------------------------------------
# 写入页面后是否自动抽取双链/引用关系，必填布尔值。可选值：true/false/1/0。
GBRAIN_AUTO_LINK = "true"

# 写入页面后是否自动抽取时间线条目，必填布尔值。可选值：true/false/1/0。
GBRAIN_AUTO_TIMELINE = "true"

# 写入后是否运行静态检查，必填布尔值。可选值：true/false/1/0。
GBRAIN_POST_WRITE_LINT = "false"

# -----------------------------------------------------------------------------
# KB 子系统与后台任务配置
# -----------------------------------------------------------------------------
# 是否启用 KB 子系统，必填布尔值。可选值：true/false/1/0。
GBRAIN_KB_ENABLED = "true"

# KB 上传文件大小上限，单位 MiB，必填正整数。
GBRAIN_KB_MAX_FILE_SIZE_MB = "50"

# KB 允许处理的文件扩展名，必填非空逗号分隔列表。
# 常见类型：pdf, docx, xlsx, csv, tsv, html, htm, txt, md, markdown, rst, json, xml, yaml, yml, toml, png, jpg, jpeg。
GBRAIN_KB_ALLOWED_EXTENSIONS = "pdf,docx,xlsx,csv,tsv,html,htm,txt,md,markdown,rst,json,xml,yaml,yml,toml,png,jpg,jpeg"

# 自定义 KB 存储根目录，必填。源码主要在清理安全检查中使用该根目录。
GBRAIN_KB_STORAGE_DIR = "<请填写 KB 存储根目录>"

# 是否启用 KB 后台工作器，必填布尔值。用于异步处理导入、OCR、重嵌入等任务。
GBRAIN_KB_WORKER_ENABLED = "true"

# KB 后台工作器轮询间隔，单位秒，必填正整数。
GBRAIN_KB_WORKER_POLL_INTERVAL = "30"

# 是否启用自动维护，必填布尔值。gbrain serve 时会定期做维护任务，例如补嵌入、健康检查。
GBRAIN_AUTOPILOT_ENABLED = "true"

# 自动维护执行间隔，单位秒，必填整数且必须 >= 60；非法值不再自动修正。
GBRAIN_AUTOPILOT_INTERVAL = "3600"

# -----------------------------------------------------------------------------
# 制品（Artifact）路由与存储配置
# -----------------------------------------------------------------------------
# 制品原件或附件存储目录，必填。
GBRAIN_ARTIFACT_STORAGE_DIR = "<请填写制品存储目录>"

# 默认 KB 库 ID。可为空，表示不强制默认库；非空时必须是大于 0 的整数。
GBRAIN_DEFAULT_KB_LIBRARY_ID = ""

# 上传默认提升策略，必填。可选值：
# - none：不提升到 KB 或候选，仅保留制品记录。
# - shadow：生成影子页面或影子投影，用于后续审阅或检索。
# - candidate：生成候选变更，需要后续审阅或应用。
# - auto / auto-low-risk / auto_accept_low_risk：仅自动应用低风险候选。
# - auto-apply / auto_apply / auto_all / auto-all / auto-apply-all：自动应用全部可应用候选。
GBRAIN_UPLOAD_PROMOTION_POLICY = "auto-apply"

# 制品默认意图，必填。可选值：
# - memory：长期记忆；默认会写入 gbrain 页面，并可同步进入 KB。
# - evidence：证据/资料型内容，更偏向作为检索证据。
# - promote：进入提升/候选流程，用于从原始材料提炼结构化知识。
GBRAIN_ARTIFACT_DEFAULT_INTENT = "memory"

# artifact_put 需要 KB 收件箱但不存在时，是否自动创建收件箱库，必填布尔值。
GBRAIN_ARTIFACT_AUTO_CREATE_INBOX_LIBRARY = "true"

# memory 意图是否也写入 KB，必填布尔值。
# - true：memory 同时写页面和 KB，便于语义检索。
# - false：memory 只写 gbrain 页面，不进入 KB 文档处理流程。
GBRAIN_ARTIFACT_MANUAL_MEMORY_TO_KB = "true"

# -----------------------------------------------------------------------------
# OCR 与 GLM-OCR 配置
# -----------------------------------------------------------------------------
# OCR 全局开关，必填布尔值。可选值：true/false/1/0。
GBRAIN_OCR_ENABLED = "true"

# OCR API 密钥。GBRAIN_OCR_ENABLED=true 时必填；不再兼容 ZHIPU_API_KEY 回退。
GBRAIN_OCR_API_KEY = "<请填写 OCR API 密钥>"

# OCR API URL。GBRAIN_OCR_ENABLED=true 时必填，必须是 http/https URL。
GBRAIN_OCR_BASE_URL = "https://open.bigmodel.cn/api/paas/v4/layout_parsing"

# 是否允许使用 GBRAIN_OCR_BASE_URL 指定的 OCR URL，必填布尔值。
# 当前设为 true，表示使用本文件显式配置的 URL；设为 false 时源码会固定官方 endpoint。
GBRAIN_OCR_ALLOW_CUSTOM_BASE_URL = "true"

# OCR 模型名。GBRAIN_OCR_ENABLED=true 时必填；不再兼容 GLMOCR_MODEL 回退。
GBRAIN_OCR_MODEL = "glm-ocr"

# OCR 后处理配置，必填，不直接发给 API，而是影响识别结果如何整理。可选值：
# - auto：按 OCR 返回的版面块自动增强；表格块按 table，公式块按 formula，其它内容按 general。
# - general：通用文档。
# - table：更关注表格结构。
# - formula：更关注公式内容。
# - handwriting：手写场景。
GBRAIN_OCR_PROFILE = "auto"

# 是否请求 OCR 提供方返回版面细节，必填布尔值。不再兼容 GLMOCR_ENABLE_LAYOUT 回退。
GBRAIN_OCR_ENABLE_LAYOUT = "true"

# OCR 选择模式，必填。可选值：
# - auto：先本地检测，只对空文本、低密度、图片/矢量/乱码等疑似页面 OCR。
# - all_pages：强制所有页 OCR，成本更高但最彻底。
GBRAIN_OCR_MODE = "auto"

# PDF OCR 提交模式，必填。可选值：
# - pdf_range：按页段/范围提交，更稳，便于控制页数和大小。
# - pdf_first：优先整 PDF 提交，失败或受限时再走拆分逻辑。
GBRAIN_OCR_SUBMIT_MODE = "pdf_range"

# 低文本密度阈值，必填非负整数。页面文本字符数低于该值时可能被判定为 OCR 候选页。
GBRAIN_OCR_TEXT_DENSITY_THRESHOLD = "50"

# 旧版低密度比例阈值，必填数字且范围 0..=1；当前源码注释为已废弃，保留用于兼容旧配置结构。
GBRAIN_OCR_MIN_LOW_DENSITY_RATIO = "0.5"

# 图片面积占比阈值，必填数字且范围 0..=1。页面图片区域比例超过该值时可能触发 OCR。
GBRAIN_OCR_IMAGE_AREA_THRESHOLD = "0.08"

# 页面嵌入图片数量阈值，必填正整数。达到该数量时可能触发 OCR。
GBRAIN_OCR_IMAGE_COUNT_THRESHOLD = "1"

# OCR 单页超时秒数，必填正整数。多页请求会按页数放大总超时；不再兼容 GLM_OCR_TIMEOUT/GLMOCR_TIMEOUT 回退。
GBRAIN_OCR_TIMEOUT_SECONDS_PER_PAGE = "60"

# 单次 OCR 请求最多包含多少页，必填正整数。
GBRAIN_OCR_MAX_PAGES_PER_REQUEST = "5"

# 单次 OCR 请求最大 PDF 字节数，必填正整数。52428800 = 50 MiB。
GBRAIN_OCR_MAX_PDF_BYTES_PER_REQUEST = "52428800"

# 单文档最多尝试 OCR 的页数，必填正整数；0 不再自动修正。
GBRAIN_OCR_MAX_PAGES_PER_DOCUMENT = "300"

# OCR 最大并发请求数，必填正整数；0 不再自动修正。
GBRAIN_OCR_MAX_CONCURRENCY = "2"

# OCR 拆分页临时文件的进程内总字节预算，必填正整数。536870912 = 512 MiB。
GBRAIN_OCR_TEMP_DIR_MAX_BYTES = "536870912"

# 是否要求 OCR 提供方返回裁剪图片，必填布尔值。开启会增加响应体大小和存储压力。
GBRAIN_OCR_RETURN_CROP_IMAGES = "false"

# 是否要求 OCR 提供方返回版面可视化结果，必填布尔值。通常调试 OCR 版面时才开启。
GBRAIN_OCR_NEED_LAYOUT_VISUALIZATION = "false"

# 是否同步内联执行 OCR，必填布尔值。
# - false：默认异步任务，适合生产；上传/处理流程不会长时间阻塞。
# - true：当前处理流程内直接 OCR，便于调试，但会拉长单次处理时间。
GBRAIN_OCR_SYNC_INLINE = "false"

# -----------------------------------------------------------------------------
# 命令行、进度、运行时、搜索调优
# -----------------------------------------------------------------------------
# 进度输出模式。可选值：
# - auto：自动选择，通常交互终端显示人类可读进度，非交互环境更安静。
# - human：人类可读进度。
# - json：每行输出 JSON 事件，适合集成脚本。
# - quiet：不输出进度。
GBRAIN_PROGRESS_MODE = "auto"

# 强制 JSON 进度输出，可选值：true/false/1/0。GBRAIN_PROGRESS_MODE=json 时语义上已经是 JSON。
GBRAIN_PROGRESS_JSON = "0"

# 全局 Tokio 运行时工作线程数，必填正整数；源码实际最小使用值为 2。
GBRAIN_ASYNC_WORKER_THREADS = "4"

# 搜索调试日志开关，可选值：true/false/1/0。
GBRAIN_SEARCH_DEBUG = "false"

# 搜索硬排除 slug 前缀，逗号分隔。可为空；默认硬排除包含 test/、archive/、attachments/、.raw/。
GBRAIN_SEARCH_EXCLUDE = ""

# 搜索来源加权规则，逗号分隔，每项格式为“前缀:系数”。可为空；系数必须是非负有限数。示例：projects/:1.4,daily/:0.8。
GBRAIN_SOURCE_BOOST = ""
